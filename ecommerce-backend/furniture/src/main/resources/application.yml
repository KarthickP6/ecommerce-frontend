spring:
  application:
    name: furniture-ecommerce

  # Database Configuration
  datasource:
    url: jdbc:postgresql://localhost:5432/furniture
    username: postgres
    password: test
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 20
          fetch_size: 50
        order_inserts: true
        order_updates: true
    show-sql: false

  # Flyway Configuration
  flyway:
    baselineOnMigrate: true
    locations: classpath:db/migration

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null
    time-zone: UTC

# JWT Configuration
jwt:
  secret: your-super-secret-key-change-this-in-production-must-be-at-least-256-bits-long-for-hs512
  expiration: 900000  # 15 minutes in milliseconds
  refreshExpiration: 604800000  # 7 days in milliseconds

# Server Configuration
server:
  port: 8080


# Logging
logging:
  level:
    root: INFO
    com.meenatchi: DEBUG
    org.springframework.security: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n"

# Swagger/OpenAPI
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
  api-docs:
    path: /v3/api-docs
  show-actuator: true

