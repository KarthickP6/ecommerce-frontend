name: Deploy React + Vite to Azure Static Website

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build_and_deploy:
    name: Build and Deploy to Azure Storage Static Website
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ecommerce-frontend/package-lock.json

      - name: Install dependencies
        working-directory: ecommerce-frontend
        run: npm ci

      - name: Build application
        working-directory: ecommerce-frontend
        run: npm run build
        env:
          NODE_ENV: production

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Storage Static Website
        run: |
          az storage blob upload-batch \
            --account-name ${{ secrets.STORAGE_ACCOUNT_NAME }} \
            --account-key ${{ secrets.STORAGE_ACCOUNT_KEY }} \
            --source ecommerce-frontend/dist \
            --destination '$web' \
            --overwrite

      - name: Purge CDN cache (Optional)
        if: ${{ secrets.CDN_PROFILE_NAME != '' }}
        run: |
          az cdn endpoint purge \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --profile-name ${{ secrets.CDN_PROFILE_NAME }} \
            --name ${{ secrets.CDN_ENDPOINT_NAME }} \
            --content-paths "/*"

