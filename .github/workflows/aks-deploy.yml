8name: Build and Deploy Spring Boot Backend to AKS

on:
  push:
    branches:
      - main
    paths:
      - 'ecommerce-backend/**'
      - '.github/workflows/aks-deploy.yml'

env:
  REGISTRY: ${{ secrets.ACR_LOGIN_SERVER }}
  IMAGE_NAME: furniture-backend
  TAG: ${{ github.sha }}

jobs:
  build_and_deploy:
    name: Build Docker Image and Deploy to AKS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        working-directory: ecommerce-backend/furniture
        run: mvn clean package -DskipTests

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build Docker image
        run: |
          docker build \
            -f ecommerce-backend/furniture/Dockerfile \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.TAG }} \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            ecommerce-backend/furniture

      - name: Push Docker image to ACR
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.TAG }}
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Set AKS context
        uses: azure/aks-set-context@v3
        with:
          resource-group: ${{ secrets.AZURE_RESOURCE_GROUP }}
          cluster-name: ${{ secrets.AKS_CLUSTER_NAME }}

      - name: Update deployment image
        run: |
          kubectl set image deployment/furniture-backend \
            furniture-backend=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.TAG }} \
            -n default

      - name: Deploy to AKS
        run: |
          kubectl apply -f ecommerce-backend/furniture/k8s/deployment.yaml
          kubectl rollout status deployment/furniture-backend -n default

      - name: Verify deployment
        run: |
          kubectl get deployments -n default
          kubectl get services -n default
          kubectl get pods -n default

